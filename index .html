<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator HPP & Harga Jual UMKM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #f0a500;
    --accent2: #ff6b35;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #facc15;
    --text: #e8eaf0;
    --muted: #8b92b0;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }
  #root { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px;
  }
  .header-logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-title { font-size: 15px; font-weight: 800; line-height: 1.2; }
  .header-sub { font-size: 11px; color: var(--muted); }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; z-index: 100;
  }
  .nav-item {
    flex: 1; padding: 10px 4px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; border: none; background: none; color: var(--muted);
    font-family: inherit; font-size: 10px; font-weight: 600;
    transition: color 0.2s;
  }
  .nav-item.active { color: var(--accent); }
  .nav-icon { font-size: 20px; line-height: 1; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin: 12px 12px 0;
  }
  .card-title {
    font-size: 13px; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }

  /* INPUTS */
  .field { margin-bottom: 12px; }
  .label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; display: block; }
  .input, .select {
    width: 100%; padding: 10px 12px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: inherit; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .input:focus, .select:focus { border-color: var(--accent); }
  .select option { background: var(--bg); }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .input-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }

  /* BUTTONS */
  .btn {
    padding: 10px 16px; border-radius: 10px;
    font-family: inherit; font-size: 13px; font-weight: 700;
    cursor: pointer; border: none; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-outline {
    background: transparent; border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger {
    background: rgba(239,68,68,0.15); color: var(--red);
    border: 1px solid rgba(239,68,68,0.3);
    padding: 6px 10px; font-size: 12px;
  }
  .btn-success {
    background: rgba(34,197,94,0.15); color: var(--green);
    border: 1px solid rgba(34,197,94,0.3);
  }
  .btn-sm { padding: 6px 10px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; }

  /* BAHAN ROW */
  .item-row {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    position: relative;
  }
  .item-row-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 8px;
  }
  .item-name { font-weight: 700; font-size: 13px; }
  .item-cost {
    font-family: 'Space Mono', monospace;
    font-size: 12px; color: var(--accent);
  }

  /* HASIL */
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .result-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .result-box.full { grid-column: span 2; }
  .result-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .result-value {
    font-family: 'Space Mono', monospace;
    font-size: 16px; font-weight: 700;
    color: var(--text); margin-top: 4px;
  }
  .result-value.green { color: var(--green); }
  .result-value.red { color: var(--red); }
  .result-value.yellow { color: var(--yellow); }
  .result-value.accent { color: var(--accent); }

  /* BADGE */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-yellow { background: rgba(250,204,21,0.15); color: var(--yellow); }
  .badge-accent { background: rgba(240,165,0,0.15); color: var(--accent); }

  /* ALERT */
  .alert {
    padding: 12px; border-radius: 10px;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .alert-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
  .alert-warning { background: rgba(250,204,21,0.1); border: 1px solid rgba(250,204,21,0.3); color: var(--yellow); }
  .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }

  /* PRODUK LIST */
  .produk-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin: 8px 12px 0;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .produk-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .produk-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(240,165,0,0.15); }
  .produk-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .produk-name { font-weight: 800; font-size: 15px; }
  .produk-kategori { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .produk-stats { display: flex; gap: 12px; margin-top: 10px; }
  .produk-stat { text-align: center; }
  .produk-stat-val { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; }
  .produk-stat-lbl { font-size: 10px; color: var(--muted); }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 12px 0; }

  /* TOGGLE */
  .toggle-group { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
  .toggle-btn {
    flex: 1; padding: 8px; border: none; border-radius: 8px;
    background: none; color: var(--muted); font-family: inherit;
    font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .toggle-btn.active { background: var(--accent); color: #000; }

  /* SECTION TITLE */
  .section-top {
    padding: 16px 12px 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-title { font-size: 18px; font-weight: 800; }

  /* EMPTY */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* RANGE */
  .range { width: 100%; accent-color: var(--accent); cursor: pointer; }

  /* PILL */
  .pill-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .pill {
    padding: 5px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--muted); transition: all 0.15s;
  }
  .pill.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* BEP VISUAL */
  .bep-bar { height: 8px; background: var(--surface2); border-radius: 4px; margin-top: 8px; overflow: hidden; }
  .bep-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--green), var(--accent)); transition: width 0.5s; }

  /* SCROLLABLE */
  .page { padding-top: 8px; }

  /* MONO */
  .mono { font-family: 'Space Mono', monospace; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── UTILS ──────────────────────────────────────────────────────────────
const rp = (n) => 'Rp ' + (Number(n)||0).toLocaleString('id-ID');
const num = (v) => parseFloat(v) || 0;
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);

const KATEGORI = ['Makanan','Minuman','Kue & Roti','Snack','Frozen Food','Bumbu & Sambal','Lainnya'];

const CONTOH_FRIED_CHICKEN = {
  id: uid(),
  nama: 'Fried Chicken',
  kategori: 'Makanan',
  jumlahProduksi: 50,
  targetJual: 40,
  bahan: [
    { id: uid(), nama: 'Ayam potong', hargaBeli: 80000, jumlahBeli: 1, jumlahPakai: 1, satuan: 'kg' },
    { id: uid(), nama: 'Tepung bumbu', hargaBeli: 20000, jumlahBeli: 1, jumlahPakai: 0.3, satuan: 'kg' },
    { id: uid(), nama: 'Minyak goreng', hargaBeli: 22000, jumlahBeli: 1, jumlahPakai: 0.5, satuan: 'liter' },
    { id: uid(), nama: 'Telur', hargaBeli: 30000, jumlahBeli: 15, jumlahPakai: 2, satuan: 'butir' },
    { id: uid(), nama: 'Bumbu rempah', hargaBeli: 15000, jumlahBeli: 1, jumlahPakai: 1, satuan: 'sachet' },
  ],
  operasional: [
    { id: uid(), nama: 'Gas LPG', biaya: 25000, periode: 'harian' },
    { id: uid(), nama: 'Listrik', biaya: 150000, periode: 'bulanan' },
    { id: uid(), nama: 'Sewa lapak', biaya: 300000, periode: 'bulanan' },
  ],
  kemasan: 500,
  hargaJualMode: 'otomatis',
  hargaJualManual: 0,
  marginTarget: 35,
};

// ── KALKULASI ──────────────────────────────────────────────────────────
function hitungHPP(produk) {
  const { bahan, operasional, kemasan, jumlahProduksi, targetJual, marginTarget, hargaJualMode, hargaJualManual } = produk;
  
  const detailBahan = (bahan||[]).map(b => {
    const biaya = (num(b.jumlahBeli) > 0)
      ? (num(b.hargaBeli) / num(b.jumlahBeli)) * num(b.jumlahPakai)
      : 0;
    return { ...b, biayaPerResep: biaya };
  });
  const totalBahan = detailBahan.reduce((s, b) => s + b.biayaPerResep, 0);
  const hppBahan = jumlahProduksi > 0 ? totalBahan / num(jumlahProduksi) : 0;

  const detailOps = (operasional||[]).map(o => {
  const periode = (o.periode || '').toLowerCase();
  let harian = num(o.biaya);

  if (periode === 'bulanan') {
    harian = harian / 30;
  } else if (periode === 'mingguan') {
    harian = harian / 7;
  } else if (periode === 'harian') {
    harian = harian;
  } else if (periode === 'perproduk') {
    harian = harian * num(targetJual);
  } else if (periode === 'perproduksi') {
    harian = harian;
  }

  const perProduk = targetJual > 0 ? harian / num(targetJual) : 0;

  return { ...o, harian, perProduk };
});
  const totalOpsHarian = detailOps.reduce((s, o) => s + o.harian, 0);
  const opsPerProduk = targetJual > 0 ? totalOpsHarian / num(targetJual) : 0;

  const hpp = hppBahan + opsPerProduk + num(kemasan);

  let hargaJual;
  if (hargaJualMode === 'manual') {
    hargaJual = num(hargaJualManual);
  } else {
    const m = num(marginTarget) / 100;
    hargaJual = m < 1 ? hpp / (1 - m) : hpp * 2;
  }

  const profit = hargaJual - hpp;
  const margin = hargaJual > 0 ? (profit / hargaJual) * 100 : 0;

  // Biaya tetap = operasional bulanan
  const biayaTetapHarian = totalOpsHarian;

  const bep = profit > 0
    ? Math.ceil(biayaTetapHarian / profit)
    : Infinity;

  return {
    detailBahan, totalBahan, hppBahan,
    detailOps, totalOpsHarian, opsPerProduk,
    hpp, hargaJual, profit, margin, bep,
    biayaTetapHarian,
  };
}

// ── KOMPONEN KECIL ─────────────────────────────────────────────────────
const Icon = ({ name }) => {
  const icons = {
    home: '🏠', plus: '➕', trash: '🗑️', edit: '✏️', check: '✅',
    food: '🍗', drink: '🥤', back: '←', info: '💡', warn: '⚠️',
    danger: '🚨', money: '💰', chart: '📊', bep: '📈', ops: '⚙️',
    pack: '📦', calc: '🧮', sim: '🎯', save: '💾', list: '📋',
  };
  return <span>{icons[name] || '•'}</span>;
};

// ── HALAMAN DASHBOARD ──────────────────────────────────────────────────
function Dashboard({ produkList, onSelect, onAdd, onDelete, selectedId }) {
  return (
    <div className="page fade-in">
      <div className="section-top">
        <div className="section-title">📋 Daftar Produk</div>
        <button className="btn btn-primary btn-sm" onClick={onAdd}>
          <Icon name="plus" /> Tambah
        </button>
      </div>

      {produkList.length === 0 ? (
        <div className="card" style={{margin:'12px'}}>
          <div className="empty">
            <div className="empty-icon">🍗</div>
            <div style={{fontWeight:700,marginBottom:8}}>Belum ada produk</div>
            <div style={{fontSize:12,marginBottom:16}}>Tambah produk pertama kamu, atau muat contoh Fried Chicken.</div>
          </div>
        </div>
      ) : (
        produkList.map(p => {
          const h = hitungHPP(p);
          const statusBadge = h.profit < 0
            ? <span className="badge badge-red">🚨 Rugi</span>
            : h.margin < 20
            ? <span className="badge badge-yellow">⚠️ Margin Rendah</span>
            : <span className="badge badge-green">✅ Sehat</span>;
          return (
            <div
              key={p.id}
              className={`produk-card fade-in${selectedId === p.id ? ' active' : ''}`}
              onClick={() => onSelect(p.id)}
            >
              <div className="produk-card-top">
                <div>
                  <div className="produk-name">{p.nama}</div>
                  <div className="produk-kategori">{p.kategori} · {p.jumlahProduksi} pcs/batch</div>
                </div>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  {statusBadge}
                  <button className="btn btn-danger btn-sm" onClick={e=>{e.stopPropagation();onDelete(p.id)}}>🗑️</button>
                </div>
              </div>
              <div className="produk-stats">
                <div className="produk-stat">
                  <div className="produk-stat-val mono" style={{color:'var(--muted)',fontSize:12}}>{rp(h.hpp)}</div>
                  <div className="produk-stat-lbl">HPP</div>
                </div>
                <div className="produk-stat">
                  <div className="produk-stat-val mono" style={{color:'var(--accent)',fontSize:12}}>{rp(h.hargaJual)}</div>
                  <div className="produk-stat-lbl">Harga Jual</div>
                </div>
                <div className="produk-stat">
                  <div className="produk-stat-val mono" style={{color: h.margin >= 20 ? 'var(--green)' : 'var(--yellow)',fontSize:12}}>{h.margin.toFixed(1)}%</div>
                  <div className="produk-stat-lbl">Margin</div>
                </div>
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

// ── FORM INPUT PRODUK ──────────────────────────────────────────────────
function FormProduk({ produk, onChange }) {
  return (
    <div className="card fade-in">
      <div className="card-title">📦 Info Produk</div>
      <div className="field">
        <label className="label">Nama Produk</label>
        <input className="input" value={produk.nama} onChange={e=>onChange('nama',e.target.value)} placeholder="cth: Fried Chicken" />
      </div>
      <div className="input-row">
        <div className="field">
          <label className="label">Kategori</label>
          <select className="select" value={produk.kategori} onChange={e=>onChange('kategori',e.target.value)}>
            {KATEGORI.map(k=><option key={k}>{k}</option>)}
          </select>
        </div>
        <div className="field">
          <label className="label">Jml Produksi (pcs)</label>
          <input className="input" type="text" inputMode="numeric" value={produk.jumlahProduksi} onChange={e=>onChange('jumlahProduksi',e.target.value)} min="1" />
        </div>
      </div>
      <div className="field">
        <label className="label">Target Jual Harian (pcs)</label>
        <input className="input" type="text" inputMode="numeric" value={produk.targetJual} onChange={e=>onChange('targetJual',e.target.value)} min="1" />
      </div>
    </div>
  );
}

// ── FORM BAHAN ─────────────────────────────────────────────────────────
function FormBahan({ bahan, onChange, onAdd, onDelete, jumlahProduksi }) {
  return (
    <div className="card fade-in">
      <div className="card-title" style={{justifyContent:'space-between'}}>
        <span>🥚 Bahan Baku</span>
        <button className="btn btn-outline btn-sm" onClick={onAdd}>+ Tambah</button>
      </div>
      {bahan.length === 0 && <div style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:'20px 0'}}>Belum ada bahan. Klik + Tambah.</div>}
      {bahan.map((b, i) => {
        const biaya = num(b.jumlahBeli) > 0 ? (num(b.hargaBeli)/num(b.jumlahBeli))*num(b.jumlahPakai) : 0;
        const hppBahan = num(jumlahProduksi) > 0 ? biaya/num(jumlahProduksi) : 0;
        return (
          <div key={b.id} className="item-row">
            <div className="item-row-header">
              <input
                className="input" style={{fontWeight:700,fontSize:13,padding:'6px 10px'}}
                value={b.nama} onChange={e=>onChange(i,'nama',e.target.value)}
                placeholder="Nama bahan"
              />
              <button className="btn btn-danger" style={{marginLeft:8,flexShrink:0}} onClick={()=>onDelete(i)}>🗑️</button>
            </div>
            <div className="input-row">
              <div className="field" style={{marginBottom:0}}>
                <label className="label">Harga Beli (Rp)</label>
                <input className="input" type="text" inputMode="numeric" value={b.hargaBeli} onChange={e=>onChange(i,'hargaBeli',e.target.value)} />
              </div>
              <div className="field" style={{marginBottom:0}}>
                <label className="label">Jml Beli</label>
                <input className="input" type="text" inputMode="decimal" value={b.jumlahBeli} onChange={e=>onChange(i,'jumlahBeli',e.target.value)} />
              </div>
            </div>
            <div className="input-row" style={{marginTop:8}}>
              <div className="field" style={{marginBottom:0}}>
                <label className="label">Jml Dipakai</label>
                <input className="input" type="text" inputMode="decimal" value={b.jumlahPakai} onChange={e=>onChange(i,'jumlahPakai',e.target.value)} step="0.01" />
              </div>
              <div className="field" style={{marginBottom:0}}>
                <label className="label">Satuan</label>
                <input className="input" value={b.satuan||''} onChange={e=>onChange(i,'satuan',e.target.value)} placeholder="kg/liter/pcs" />
              </div>
            </div>
            <div style={{marginTop:8,display:'flex',justifyContent:'space-between',fontSize:12}}>
              <span style={{color:'var(--muted)'}}>Biaya resep:</span>
              <span className="mono" style={{color:'var(--accent)',fontWeight:700}}>{rp(biaya)}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginTop:2}}>
              <span style={{color:'var(--muted)'}}>HPP per produk:</span>
              <span className="mono" style={{color:'var(--muted)'}}>{rp(hppBahan)}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── FORM OPERASIONAL ───────────────────────────────────────────────────
function FormOperasional({ ops, onChange, onAdd, onDelete, targetJual }) {
  const periodeLabel = { harian:'Harian', bulanan:'Bulanan', perProduk:'Per Produk' };
  return (
    <div className="card fade-in">
      <div className="card-title" style={{justifyContent:'space-between'}}>
        <span>⚙️ Biaya Operasional</span>
        <button className="btn btn-outline btn-sm" onClick={onAdd}>+ Tambah</button>
      </div>
      {ops.length === 0 && <div style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:'20px 0'}}>Belum ada biaya operasional.</div>}
      {ops.map((o, i) => {
        let harian = num(o.biaya);
        if (o.periode === 'bulanan') harian = harian / 30;
        const perProduk = num(targetJual) > 0 ? harian / num(targetJual) : 0;
        return (
          <div key={o.id} className="item-row">
            <div className="item-row-header">
              <input className="input" style={{fontWeight:700,fontSize:13,padding:'6px 10px'}} value={o.nama} onChange={e=>onChange(i,'nama',e.target.value)} placeholder="Nama biaya" />
              <button className="btn btn-danger" style={{marginLeft:8,flexShrink:0}} onClick={()=>onDelete(i)}>🗑️</button>
            </div>
            <div className="input-row">
              <div className="field" style={{marginBottom:0}}>
                <label className="label">Biaya (Rp)</label>
                <input className="input" type="text" inputMode="numeric" value={o.biaya} onChange={e=>onChange(i,'biaya',e.target.value)} />
              </div>
              <div className="field" style={{marginBottom:0}}>
                <label className="label">Periode</label>
                <select className="select" value={o.periode} onChange={e=>onChange(i,'periode',e.target.value)}>
                  <option value="harian">Harian</option>
                  <option value="bulanan">Bulanan</option>
                  <option value="perProduk">Per Produk</option>
                </select>
              </div>
            </div>
            {o.periode === 'bulanan' && (
              <div style={{marginTop:8,display:'flex',justifyContent:'space-between',fontSize:11}}>
                <span style={{color:'var(--muted)'}}>→ Harian: {rp(harian)}</span>
                <span style={{color:'var(--muted)'}}>Per produk: {rp(perProduk)}</span>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── FORM KEMASAN & HARGA ───────────────────────────────────────────────
function FormHarga({ produk, onChange, hasil }) {
  const { hpp, hargaJual, profit, margin } = hasil;
  const profitColor = profit < 0 ? 'red' : profit === 0 ? 'yellow' : 'green';
  const marginColor = margin < 0 ? 'red' : margin < 20 ? 'yellow' : 'green';

  return (
    <>
      <div className="card fade-in">
        <div className="card-title">📦 Kemasan</div>
        <div className="field" style={{marginBottom:0}}>
          <label className="label">Biaya Kemasan per Produk (Rp)</label>
          <input className="input" type="text" inputMode="numeric" value={produk.kemasan} onChange={e=>onChange('kemasan',e.target.value)} placeholder="0" />
        </div>
      </div>

      <div className="card fade-in">
        <div className="card-title">💰 Harga Jual</div>
        <div className="toggle-group" style={{marginBottom:12}}>
          <button className={`toggle-btn${produk.hargaJualMode==='otomatis'?' active':''}`} onClick={()=>onChange('hargaJualMode','otomatis')}>🤖 Otomatis</button>
          <button className={`toggle-btn${produk.hargaJualMode==='manual'?' active':''}`} onClick={()=>onChange('hargaJualMode','manual')}>✏️ Manual</button>
        </div>

        {produk.hargaJualMode === 'otomatis' ? (
          <div>
            <label className="label">Target Margin: <strong style={{color:'var(--accent)'}}>{produk.marginTarget}%</strong></label>
            <input className="range" type="range" min="5" max="80" value={produk.marginTarget} onChange={e=>onChange('marginTarget',e.target.value)} />
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)',marginTop:4}}>
              <span>5%</span><span>Harga jual = HPP ÷ (1 - margin)</span><span>80%</span>
            </div>
          </div>
        ) : (
          <div className="field" style={{marginBottom:0}}>
            <label className="label">Harga Jual Manual (Rp)</label>
            <input className="input" type="text" inputMode="numeric" value={produk.hargaJualManual} onChange={e=>onChange('hargaJualManual',e.target.value)} />
          </div>
        )}
      </div>

      <div className="card fade-in">
        <div className="card-title">📊 Ringkasan HPP & Harga</div>
        <div className="result-grid">
          <div className="result-box">
            <div className="result-label">HPP Total</div>
            <div className="result-value accent">{rp(hpp)}</div>
          </div>
          <div className="result-box">
            <div className="result-label">Harga Jual</div>
            <div className="result-value">{rp(hargaJual)}</div>
          </div>
          <div className="result-box">
            <div className="result-label">Profit/pcs</div>
            <div className={`result-value ${profitColor}`}>{rp(profit)}</div>
          </div>
          <div className="result-box">
            <div className="result-label">Margin</div>
            <div className={`result-value ${marginColor}`}>{margin.toFixed(1)}%</div>
          </div>
        </div>

        {profit < 0 && (
          <div className="alert alert-danger" style={{marginTop:12}}>
            <span>🚨</span>
            <span>Harga jual lebih rendah dari HPP! Kamu akan <strong>RUGI {rp(Math.abs(profit))}</strong> per produk.</span>
          </div>
        )}
        {profit >= 0 && margin < 20 && margin >= 0 && (
          <div className="alert alert-warning" style={{marginTop:12}}>
            <span>⚠️</span>
            <span>Margin kurang dari 20%. Pertimbangkan menaikkan harga atau efisiensi biaya.</span>
          </div>
        )}
        {profit >= 0 && margin >= 20 && (
          <div className="alert alert-success" style={{marginTop:12}}>
            <span>✅</span>
            <span>Harga jual sehat! Margin {margin.toFixed(1)}% sudah baik untuk usaha.</span>
          </div>
        )}
      </div>
    </>
  );
}

// ── HALAMAN SIMULASI ───────────────────────────────────────────────────
function Simulasi({ produk, hasil }) {
  const [jumlahJual, setJumlahJual] = useState(produk.targetJual || 10);
  const { hpp, hargaJual, profit, margin, bep, biayaTetapHarian } = hasil;

  const omzet = hargaJual * num(jumlahJual);
  const totalHPP = hpp * num(jumlahJual);
  const profitTotal = profit * num(jumlahJual);
  const bepPct = bep > 0 && isFinite(bep) ? Math.min((num(jumlahJual) / bep) * 100, 100) : 100;

  return (
    <div className="page fade-in">
      <div style={{padding:'16px 12px 0'}}>
        <div className="section-title">🎯 Simulasi Penjualan</div>
        <div style={{color:'var(--muted)',fontSize:12,marginTop:4}}>Produk: <strong style={{color:'var(--text)'}}>{produk.nama}</strong></div>
      </div>

      <div className="card">
        <div className="card-title">📦 Jumlah Jual</div>
        <label className="label">Simulasi Jual: <strong style={{color:'var(--accent)'}}>{jumlahJual} pcs</strong></label>
        <input className="range" type="range" min="1" max={Math.max(200, num(produk.targetJual)*3)} value={jumlahJual} onChange={e=>setJumlahJual(e.target.value)} />
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)',marginTop:4}}>
          <span>1</span>
          <input className="input" type="text" inputMode="numeric" value={jumlahJual} onChange={e=>setJumlahJual(e.target.value)} style={{width:80,textAlign:'center',padding:'4px 8px',fontSize:13}} />
          <span>{Math.max(200, num(produk.targetJual)*3)}</span>
        </div>
      </div>

      <div className="card">
        <div className="card-title">💰 Hasil Simulasi</div>
        <div className="result-grid">
          <div className="result-box full">
            <div className="result-label">Total Omzet</div>
            <div className="result-value accent" style={{fontSize:22}}>{rp(omzet)}</div>
          </div>
          <div className="result-box">
            <div className="result-label">Total HPP</div>
            <div className="result-value red">{rp(totalHPP)}</div>
          </div>
          <div className="result-box">
            <div className="result-label">Profit Total</div>
            <div className={`result-value ${profitTotal >= 0 ? 'green' : 'red'}`}>{rp(profitTotal)}</div>
          </div>
          <div className="result-box">
            <div className="result-label">Harga/pcs</div>
            <div className="result-value">{rp(hargaJual)}</div>
          </div>
          <div className="result-box">
            <div className="result-label">Margin</div>
            <div className={`result-value ${margin >= 20 ? 'green' : 'yellow'}`}>{margin.toFixed(1)}%</div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">📈 Break Even Point (BEP)</div>
        {isFinite(bep) && bep > 0 ? (
          <>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div>
                <div style={{fontSize:12,color:'var(--muted)'}}>Harus jual minimal</div>
                <div className="mono" style={{fontSize:28,fontWeight:700,color:'var(--accent)'}}>{bep} <span style={{fontSize:14}}>pcs/hari</span></div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:11,color:'var(--muted)'}}>Biaya tetap harian</div>
                <div className="mono" style={{fontSize:13,color:'var(--text)'}}>{rp(biayaTetapHarian)}</div>
              </div>
            </div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:4}}>
              Progress: {num(jumlahJual)} / {bep} pcs ({bepPct.toFixed(0)}%)
            </div>
            <div className="bep-bar">
              <div className="bep-fill" style={{width: bepPct + '%'}}></div>
            </div>
            {num(jumlahJual) >= bep ? (
              <div className="alert alert-success" style={{marginTop:10}}>
                <span>✅</span><span>Kamu sudah melewati BEP! Semua penjualan berikutnya adalah profit murni.</span>
              </div>
            ) : (
              <div className="alert alert-warning" style={{marginTop:10}}>
                <span>⚠️</span><span>Masih butuh jual <strong>{bep - num(jumlahJual)} pcs lagi</strong> untuk balik modal.</span>
              </div>
            )}
          </>
        ) : (
          <div className="alert alert-danger">
            <span>🚨</span><span>BEP tidak dapat dihitung. Pastikan ada profit per produk dan biaya tetap bulanan.</span>
          </div>
        )}
      </div>

      <div className="card">
        <div className="card-title">🗒️ Rincian HPP</div>
        <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
          <span style={{color:'var(--muted)',fontSize:13}}>HPP Bahan</span>
          <span className="mono" style={{fontSize:13}}>{rp(hasil.hppBahan)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
          <span style={{color:'var(--muted)',fontSize:13}}>Operasional/pcs</span>
          <span className="mono" style={{fontSize:13}}>{rp(hasil.opsPerProduk)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
          <span style={{color:'var(--muted)',fontSize:13}}>Kemasan</span>
          <span className="mono" style={{fontSize:13}}>{rp(produk.kemasan)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',padding:'8px 0'}}>
          <span style={{fontWeight:700}}>HPP Total</span>
          <span className="mono" style={{fontWeight:700,color:'var(--accent)'}}>{rp(hpp)}</span>
        </div>
      </div>
    </div>
  );
}

// ── APP UTAMA ──────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('dashboard');
  const [produkList, setProdukList] = useState(() => {
    try {
      const saved = localStorage.getItem('hpp_produk_list');
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return [{ ...CONTOH_FRIED_CHICKEN, id: uid() }];
  });
  const [selectedId, setSelectedId] = useState(null);
  const [editTab, setEditTab] = useState('produk');

  // Save to localStorage
  useEffect(() => {
    try { localStorage.setItem('hpp_produk_list', JSON.stringify(produkList)); } catch(e) {}
  }, [produkList]);

  const selectedProduk = produkList.find(p => p.id === selectedId);
  const hasilHitung = selectedProduk ? hitungHPP(selectedProduk) : null;

  const handleSelect = (id) => {
    setSelectedId(id);
    setTab('edit');
    setEditTab('produk');
  };

  const handleAdd = () => {
    const newP = {
      id: uid(), nama: '', kategori: 'Makanan',
      jumlahProduksi: 10, targetJual: 10,
      bahan: [], operasional: [],
      kemasan: 0, hargaJualMode: 'otomatis',
      hargaJualManual: 0, marginTarget: 30,
    };
    setProdukList(prev => [newP, ...prev]);
    setSelectedId(newP.id);
    setTab('edit');
    setEditTab('produk');
  };

  const handleDelete = (id) => {
    if (window.confirm('Hapus produk ini?')) {
      setProdukList(prev => prev.filter(p => p.id !== id));
      if (selectedId === id) { setSelectedId(null); setTab('dashboard'); }
    }
  };

  const updateProduk = (field, value) => {
    setProdukList(prev => prev.map(p => p.id === selectedId ? { ...p, [field]: value } : p));
  };

  // Bahan
  const addBahan = () => updateProduk('bahan', [...(selectedProduk.bahan||[]), { id: uid(), nama: '', hargaBeli: 0, jumlahBeli: 1, jumlahPakai: 1, satuan: '' }]);
  const updateBahan = (i, field, value) => {
    const baru = [...selectedProduk.bahan];
    baru[i] = { ...baru[i], [field]: value };
    updateProduk('bahan', baru);
  };
  const deleteBahan = (i) => updateProduk('bahan', selectedProduk.bahan.filter((_, idx) => idx !== i));

  // Ops
  const addOps = () => updateProduk('operasional', [...(selectedProduk.operasional||[]), { id: uid(), nama: '', biaya: 0, periode: 'bulanan' }]);
  const updateOps = (i, field, value) => {
    const baru = [...selectedProduk.operasional];
    baru[i] = { ...baru[i], [field]: value };
    updateProduk('operasional', baru);
  };
  const deleteOps = (i) => updateProduk('operasional', selectedProduk.operasional.filter((_, idx) => idx !== i));

  const navItems = [
    { id: 'dashboard', icon: '🏠', label: 'Produk' },
    { id: 'edit', icon: '✏️', label: 'Edit' },
    { id: 'simulasi', icon: '📊', label: 'Simulasi' },
  ];

  const renderEdit = () => {
    if (!selectedProduk) return (
      <div className="card" style={{margin:'20px 12px'}}>
        <div className="empty">
          <div className="empty-icon">👆</div>
          <div style={{fontWeight:700,marginBottom:8}}>Pilih Produk Dulu</div>
          <div style={{fontSize:12,marginBottom:16}}>Pilih produk dari tab Produk untuk mengeditnya.</div>
          <button className="btn btn-primary" onClick={()=>setTab('dashboard')}>← Ke Daftar Produk</button>
        </div>
      </div>
    );

    return (
      <div className="page fade-in">
        <div style={{padding:'16px 12px 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div className="section-title" style={{fontSize:16}}>{selectedProduk.nama || 'Produk Baru'}</div>
            <div style={{fontSize:11,color:'var(--muted)'}}>{selectedProduk.kategori}</div>
          </div>
          {hasilHitung && (
            <div style={{textAlign:'right'}}>
              <div className="mono" style={{fontSize:15,fontWeight:700,color:'var(--accent)'}}>{rp(hasilHitung.hargaJual)}</div>
              <div style={{fontSize:11,color: hasilHitung.margin >= 20 ? 'var(--green)' : 'var(--yellow)'}}>{hasilHitung.margin.toFixed(1)}% margin</div>
            </div>
          )}
        </div>

        <div style={{padding:'12px 12px 0'}}>
          <div className="toggle-group">
            {['produk','bahan','ops','harga'].map(t => (
              <button key={t} className={`toggle-btn${editTab===t?' active':''}`} onClick={()=>setEditTab(t)} style={{fontSize:11}}>
                {{produk:'📦 Info',bahan:'🥚 Bahan',ops:'⚙️ Ops',harga:'💰 Harga'}[t]}
              </button>
            ))}
          </div>
        </div>

        {editTab === 'produk' && <FormProduk produk={selectedProduk} onChange={updateProduk} />}
        {editTab === 'bahan' && <FormBahan bahan={selectedProduk.bahan||[]} onChange={updateBahan} onAdd={addBahan} onDelete={deleteBahan} jumlahProduksi={selectedProduk.jumlahProduksi} />}
        {editTab === 'ops' && <FormOperasional ops={selectedProduk.operasional||[]} onChange={updateOps} onAdd={addOps} onDelete={deleteOps} targetJual={selectedProduk.targetJual} />}
        {editTab === 'harga' && hasilHitung && <FormHarga produk={selectedProduk} onChange={updateProduk} hasil={hasilHitung} />}
      </div>
    );
  };

  const renderSimulasi = () => {
    if (!selectedProduk) return (
      <div className="card" style={{margin:'20px 12px'}}>
        <div className="empty">
          <div className="empty-icon">📊</div>
          <div style={{fontWeight:700,marginBottom:8}}>Pilih Produk Dulu</div>
          <div style={{fontSize:12,marginBottom:16}}>Pilih dan lengkapi produk terlebih dahulu.</div>
          <button className="btn btn-primary" onClick={()=>setTab('dashboard')}>← Ke Daftar Produk</button>
        </div>
      </div>
    );
    return <Simulasi produk={selectedProduk} hasil={hasilHitung} />;
  };

  return (
    <div>
      <div className="header">
        <div className="header-logo">🧮</div>
        <div>
          <div className="header-title">Kalkulator HPP & Harga Jual</div>
          <div className="header-sub">UMKM Indonesia · Data tersimpan otomatis</div>
        </div>
      </div>

      {tab === 'dashboard' && (
        <Dashboard
          produkList={produkList}
          onSelect={handleSelect}
          onAdd={handleAdd}
          onDelete={handleDelete}
          selectedId={selectedId}
        />
      )}
      {tab === 'edit' && renderEdit()}
      {tab === 'simulasi' && renderSimulasi()}

      <div className="bottom-nav">
        {navItems.map(n => (
          <button
            key={n.id}
            className={`nav-item${tab===n.id?' active':''}`}
            onClick={() => setTab(n.id)}
          >
            <span className="nav-icon">{n.icon}</span>
            {n.label}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
